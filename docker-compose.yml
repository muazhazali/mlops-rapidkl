services:
  ml-train:
    build:
      context: .
      dockerfile: Dockerfile.train
    volumes:
      - ./data:/app/data
    restart: "no"

  ml-inference:
    build:
      context: .
      dockerfile: Dockerfile.inference
    volumes:
      - ./data:/app/data
    depends_on:
      ml-train:
        condition: service_completed_successfully
    restart: unless-stopped

  app-ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    volumes:
      - ./data:/app/data
    ports:
      - "8050:8050"
    depends_on:
      ml-train:
        condition: service_completed_successfully
    restart: unless-stopped
